spring.application.name=foodrescue-api

# MongoDB Configuration
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/foodrescuedb}
# For production, you can use:
# spring.data.mongodb.uri=mongodb+srv://<username>:<password>@cluster0.mongodb.net/foodrescuedb

# Server
server.port=8080

